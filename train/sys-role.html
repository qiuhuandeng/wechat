<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>角色权限 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="sys-role" data-title="角色权限">
  <header class="page-header">
    <div>
      <div class="eyebrow">ROLE PERMISSION</div>
      <h1>角色权限</h1>
      <p>配置系统角色、成员数量、菜单权限、数据权限和操作权限。</p>
    </div>
    <div class="page-actions">
      <button class="button secondary" type="button" data-toast="角色权限已导出">导出</button>
      <button class="button primary" type="button" data-modal-open="roleModal">新增角色</button>
    </div>
  </header>

  <section class="grid gap-4 lg:grid-cols-[360px_1fr]">
    <aside class="panel">
      <div class="panel-header"><div><h2>角色列表</h2><p>选择角色后在右侧配置权限。</p></div><span class="badge blue">7个</span></div>
      <div class="table-wrap">
        <table class="data-table selectable" id="roleTable">
          <thead><tr><th>角色名称</th><th>成员数</th><th>操作</th></tr></thead>
          <tbody>
            <tr class="selected"><td><b>超级管理员</b></td><td>2</td><td><button class="button ghost small" data-modal-open="roleModal">编辑</button><button class="button ghost small" data-confirm="确认删除超级管理员？" data-confirm-success="角色已删除">删除</button></td></tr>
            <tr><td><b>销售</b></td><td>18</td><td><button class="button ghost small" data-modal-open="roleModal">编辑</button><button class="button ghost small" data-confirm="确认删除销售角色？" data-confirm-success="角色已删除">删除</button></td></tr>
            <tr><td><b>销售主管</b></td><td>4</td><td><button class="button ghost small" data-modal-open="roleModal">编辑</button><button class="button ghost small" data-confirm="确认删除销售主管？" data-confirm-success="角色已删除">删除</button></td></tr>
            <tr><td><b>计调</b></td><td>9</td><td><button class="button ghost small" data-modal-open="roleModal">编辑</button><button class="button ghost small" data-confirm="确认删除计调角色？" data-confirm-success="角色已删除">删除</button></td></tr>
            <tr><td><b>财务</b></td><td>6</td><td><button class="button ghost small" data-modal-open="roleModal">编辑</button><button class="button ghost small" data-confirm="确认删除财务角色？" data-confirm-success="角色已删除">删除</button></td></tr>
            <tr><td><b>车队长</b></td><td>3</td><td><button class="button ghost small" data-modal-open="roleModal">编辑</button><button class="button ghost small" data-confirm="确认删除车队长？" data-confirm-success="角色已删除">删除</button></td></tr>
            <tr><td><b>渠道分销</b></td><td>32</td><td><button class="button ghost small" data-modal-open="roleModal">编辑</button><button class="button ghost small" data-confirm="确认删除渠道分销？" data-confirm-success="角色已删除">删除</button></td></tr>
          </tbody>
        </table>
      </div>
    </aside>

    <section class="panel" id="rolePermissionScope">
      <div class="toolbar">
        <div class="segmented" data-tabs data-scope="#rolePermissionScope">
          <button class="active" type="button" data-tab="menu">菜单权限</button>
          <button type="button" data-tab="data">数据权限</button>
          <button type="button" data-tab="action">操作权限</button>
        </div>
        <div class="toolbar-actions">
          <span class="badge blue">超级管理员</span>
          <button class="button primary small" type="button" data-toast="权限配置已保存">保存权限</button>
        </div>
      </div>

      <div data-tab-panel="menu">
        <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-3">
          <div class="rounded-xl border border-slate-200 bg-slate-50 p-4"><label class="font-semibold"><input type="checkbox" checked> 运力库存</label><div class="mt-2 space-y-2 pl-5 text-sm"><label><input type="checkbox" checked> 列车资源</label><br><label><input type="checkbox" checked> 班期计划</label><br><label><input type="checkbox" checked> 库存管理</label><br><label><input type="checkbox" checked> 守仓切位</label></div></div>
          <div class="rounded-xl border border-slate-200 bg-slate-50 p-4"><label class="font-semibold"><input type="checkbox" checked> 产品定价</label><div class="mt-2 space-y-2 pl-5 text-sm"><label><input type="checkbox" checked> 定价管理</label><br><label><input type="checkbox" checked> 退改策略</label><br><label><input type="checkbox" checked> 促销政策</label></div></div>
          <div class="rounded-xl border border-slate-200 bg-slate-50 p-4"><label class="font-semibold"><input type="checkbox" checked> 销售分销</label><div class="mt-2 space-y-2 pl-5 text-sm"><label><input type="checkbox" checked> 客户管理</label><br><label><input type="checkbox" checked> 渠道管理</label><br><label><input type="checkbox" checked> 分销管理</label></div></div>
          <div class="rounded-xl border border-slate-200 bg-slate-50 p-4"><label class="font-semibold"><input type="checkbox" checked> 订单交易</label><div class="mt-2 space-y-2 pl-5 text-sm"><label><input type="checkbox" checked> 订单管理</label><br><label><input type="checkbox" checked> 旅客资料</label><br><label><input type="checkbox" checked> 选铺管理</label><br><label><input type="checkbox" checked> 收款管理</label></div></div>
          <div class="rounded-xl border border-slate-200 bg-slate-50 p-4"><label class="font-semibold"><input type="checkbox" checked> 计调作业</label><div class="mt-2 space-y-2 pl-5 text-sm"><label><input type="checkbox" checked> 分团管理</label><br><label><input type="checkbox" checked> 地接计划</label><br><label><input type="checkbox" checked> 发团作业</label></div></div>
          <div class="rounded-xl border border-slate-200 bg-slate-50 p-4"><label class="font-semibold"><input type="checkbox" checked> 财务管理</label><div class="mt-2 space-y-2 pl-5 text-sm"><label><input type="checkbox" checked> 应收管理</label><br><label><input type="checkbox" checked> 应付管理</label><br><label><input type="checkbox" checked> 对账管理</label><br><label><input type="checkbox" checked> 班期财务</label></div></div>
          <div class="rounded-xl border border-slate-200 bg-slate-50 p-4"><label class="font-semibold"><input type="checkbox" checked> 数据分析</label><div class="mt-2 space-y-2 pl-5 text-sm"><label><input type="checkbox" checked> 经营总览</label><br><label><input type="checkbox" checked> 销售分析</label><br><label><input type="checkbox" checked> 库存分析</label><br><label><input type="checkbox" checked> 报表中心</label></div></div>
          <div class="rounded-xl border border-slate-200 bg-slate-50 p-4"><label class="font-semibold"><input type="checkbox" checked> 系统管理</label><div class="mt-2 space-y-2 pl-5 text-sm"><label><input type="checkbox" checked> 组织人员</label><br><label><input type="checkbox" checked> 角色权限</label><br><label><input type="checkbox" checked> 数据字典</label><br><label><input type="checkbox" checked> 参数设置</label></div></div>
        </div>
      </div>

      <div data-tab-panel="data" hidden>
        <div class="grid gap-4 md:grid-cols-3">
          <label class="rounded-xl border border-blue-200 bg-blue-50 p-4 text-sm"><input type="radio" name="dataScope" checked> 全部数据</label>
          <label class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm"><input type="radio" name="dataScope"> 本部门数据</label>
          <label class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm"><input type="radio" name="dataScope"> 仅本人数据</label>
        </div>
      </div>

      <div data-tab-panel="action" hidden>
        <div class="grid gap-3 md:grid-cols-3">
          <label class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm"><input type="checkbox" checked> 新建</label>
          <label class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm"><input type="checkbox" checked> 编辑</label>
          <label class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm"><input type="checkbox" checked> 删除</label>
          <label class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm"><input type="checkbox" checked> 导出</label>
          <label class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm"><input type="checkbox" checked> 审核</label>
          <label class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm"><input type="checkbox" checked> 查看真实库存</label>
        </div>
      </div>

    </section>
  </section>

  <div class="modal" id="roleModal" hidden>
    <form class="modal-card" data-success="角色已保存">
      <div class="modal-head">
        <div><span class="eyebrow">ROLE FORM</span><h2>新增角色</h2></div>
        <button class="modal-close" type="button" data-modal-close>×</button>
      </div>
      <div class="modal-body">
        <label class="field"><span>角色名称*</span><input value="销售主管" required></label>
        <label class="field"><span>角色编码</span><input value="ROLE_SALE_MANAGER"></label>
        <label class="field full"><span>角色说明</span><textarea rows="4" placeholder="填写角色职责和权限说明">负责销售团队管理、客户分配和订单审核。</textarea></label>
      </div>
      <div class="modal-foot">
        <button class="button secondary" type="button" data-modal-close>取消</button>
        <button class="button primary" type="submit">保存</button>
      </div>
    </form>
  </div>
</body>
</html>
