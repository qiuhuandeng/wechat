<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>反薅规则 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="refund-anti-abuse" data-title="反薅规则">
  <header class="page-header">
    <div>
      <div class="eyebrow">ANTI ABUSE</div>
      <h1>反薅规则</h1>
      <p>识别同一客户频繁取消占房行为，并自动加收违约金比例。</p>
    </div>
    <div class="page-actions">
      <button class="button primary" type="button" data-toast="反薅规则已保存">保存</button>
    </div>
  </header>

  <section class="panel">
    <div class="panel-header">
      <div><h2>规则卡片</h2><p>用于退改申请和违约计算页，命中后自动展示加收说明。</p></div>
      <span class="badge green">开</span>
    </div>
    <form class="form-section" data-success="反薅规则已保存">
      <div class="form-grid cols-3">
        <label class="field"><span>累计取消达到N间</span><input type="number" value="3"></label>
        <label class="field"><span>加收违约金比例</span><input type="number" value="10"></label>
        <label class="field"><span>统计周期</span><select><option>单班期</option><option>全年</option></select></label>
        <label class="check-row"><input type="checkbox" checked><div><b>是否启用</b><span>开</span></div><span class="badge green">开</span></label>
        <label class="field span-2"><span>说明</span><textarea>同一客户在统计周期内累计取消达到3间，基础违约金之外加收10%。适用于防止临时占房、反复锁定库存后取消的行为。</textarea></label>
      </div>
      <div class="modal-foot"><button class="button secondary" type="button" data-toast="已恢复默认规则">恢复默认</button><button class="button primary" type="submit">保存</button></div>
    </form>
  </section>

  <section class="metric-grid">
    <article class="metric-card"><span class="metric-icon red">命</span><div><span>本月命中</span><strong>4</strong><small>需重点复核</small></div></article>
    <article class="metric-card"><span class="metric-icon orange">间</span><div><span>累计取消</span><strong>15</strong><small>命中客户总间数</small></div></article>
    <article class="metric-card"><span class="metric-icon blue">金</span><div><span>加收违约金</span><strong>¥13,096</strong><small>规则测算金额</small></div></article>
    <article class="metric-card"><span class="metric-icon green">期</span><div><span>统计周期</span><strong>单班期</strong><small>当前启用口径</small></div></article>
  </section>

  <section class="panel">
    <div class="panel-header"><div><h2>命中记录</h2><p>只读记录，用于财务与客服解释退改加收原因。</p></div><span class="badge red">风控命中</span></div>
    <div class="table-wrap">
      <table class="data-table selectable" id="antiAbuseTable">
        <thead><tr><th>客户</th><th>累计取消间数</th><th>加收违约金</th><th>时间</th></tr></thead>
        <tbody>
          <tr class="selected"><td><b>张建国</b></td><td>3</td><td>¥3899</td><td>2026-06-20</td></tr>
          <tr><td><b>王秀兰</b></td><td>4</td><td>¥4599</td><td>2026-06-22</td></tr>
          <tr><td><b>李爱民</b></td><td>5</td><td>¥3199</td><td>2026-06-25</td></tr>
          <tr><td><b>赵玉芬</b></td><td>3</td><td>¥1399</td><td>2026-06-28</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination"><span>共 4 条 · 每页 10 条</span><div><button>‹</button><button class="active">1</button><button>›</button></div></div>
  </section>
</body>
</html>
