<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>分销权限 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
  <style>
    .permission-card { display:grid; gap:14px; }
    .permission-row { display:grid; grid-template-columns: 180px 1fr; gap:16px; align-items:start; padding:14px 0; border-bottom:1px solid #edf1f5; }
    .permission-row:last-child { border-bottom:0; }
    .permission-row > b { color:#23384d; font-size:13px; line-height:28px; }
    .permission-options { display:flex; flex-wrap:wrap; gap:10px; }
  </style>
</head>
<body data-page="distribution-permission" data-title="分销权限">
  <header class="page-header">
    <div>
      <div class="eyebrow">DISTRIBUTION PERMISSION</div>
      <h1>分销权限</h1>
      <p>控制渠道可见产品、价格类型、库存展示、下单和支付能力。</p>
    </div>
    <div class="page-actions">
      <button class="button primary" type="button" data-toast="分销权限已保存">保存</button>
    </div>
  </header>

  <section class="panel">
    <div class="form-grid cols-2">
      <label class="field wide"><span>渠道</span><select><option>康辉旅行社</option><option>众信旅游</option><option>中青旅</option></select></label>
      <label class="field"><span>权限模板</span><select><option>标准月结渠道</option><option>预付渠道</option><option>只查不下单</option></select></label>
    </div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <div><h2>权限配置卡片</h2><p>渠道门户只显示渠道结算价和模糊库存，避免暴露内部真实库存。</p></div>
      <span class="badge blue">康辉旅行社</span>
    </div>
    <form class="form-section permission-card" data-success="分销权限已保存">
      <div class="permission-row">
        <b>可见产品</b>
        <div class="permission-options">
          <label class="check-row"><input type="checkbox" checked><div><b>环云南9天</b><span>主推专列产品</span></div></label>
          <label class="check-row"><input type="checkbox" checked><div><b>滇西秘境7天</b><span>渠道可售产品</span></div></label>
          <label class="check-row"><input type="checkbox"><div><b>版纳雨林6天</b><span>暂不开放</span></div></label>
        </div>
      </div>
      <div class="permission-row">
        <b>可见价格类型</b>
        <div class="permission-options">
          <label class="check-row"><input type="radio" name="priceType" checked><div><b>渠道结算价</b><span>仅展示签约结算价</span></div></label>
        </div>
      </div>
      <div class="permission-row">
        <b>是否显示真实库存</b>
        <div class="permission-options">
          <label class="check-row"><input type="checkbox"><div><b>关</b><span>仅显示模糊状态：充足/紧张/售罄</span></div><span class="badge">关</span></label>
        </div>
      </div>
      <div class="permission-row">
        <b>是否允许自助下单</b>
        <div class="permission-options">
          <label class="check-row"><input type="checkbox" checked><div><b>开</b><span>渠道可在门户提交订单</span></div><span class="badge green">开</span></label>
        </div>
      </div>
      <div class="permission-row">
        <b>是否允许在线支付</b>
        <div class="permission-options">
          <label class="check-row"><input type="checkbox"><div><b>关</b><span>走月结，不开放在线支付</span></div><span class="badge">关</span></label>
        </div>
      </div>
      <div class="permission-row">
        <b>单笔最大下单量</b>
        <label class="field" style="max-width:220px;"><span>数量</span><input type="number" value="20"></label>
      </div>
      <div class="modal-foot"><button class="button secondary" type="button" data-toast="已恢复模板默认权限">恢复模板</button><button class="button primary" type="submit">保存</button></div>
    </form>
  </section>
</body>
</html>
