<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>名单导出已收敛 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
  <style>
    .export-form input[type="checkbox"], .export-form input[type="radio"] { width:16px; height:16px; min-width:16px; padding:0; accent-color:#1f7ae0; }
    .export-format { display:flex; align-items:center; gap:10px; min-height:35px; }
    .export-format label { display:inline-flex; align-items:center; gap:7px; min-width:82px; height:35px; padding:0 12px; border:1px solid #dbe2e8; border-radius:7px; color:#34485b; background:#f8fafc; font-size:12px; font-weight:800; }
    .check-grid { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:8px; }
    .check-grid label { display:flex; align-items:center; gap:7px; min-height:36px; padding:8px 10px; border:1px solid #e3e8ed; border-radius:7px; background:#f8fafc; color:#34485b; font-size:12px; font-weight:800; }
    @media (max-width: 900px) { .check-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 720px) { .check-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body data-page="ops-namelist" data-title="团队名单">
  <header class="page-header">
    <div>
      <div class="eyebrow">OLD PAGE</div>
      <h1>名单导出已收敛</h1>
      <p>名单导出已改为团队名单页弹窗；导出流程只保留配置，不再预览名单表格。</p>
    </div>
    <div class="page-actions">
      <a class="button secondary" href="ops-namelist.html">返回团队名单</a>
      <button class="button primary" type="button" data-toast="名单文件已导出下载">导出下载</button>
    </div>
  </header>

  <section class="panel">
    <div class="panel-header"><div><h2>导出配置</h2><p>选择范围、模板、字段和文件格式后直接导出。</p></div></div>
    <div class="form-grid cols-2 export-form">
      <label class="field"><span>导出范围*</span><select required><option>按班期</option><option>按团</option><option>按当前筛选结果</option></select></label>
      <label class="field"><span>选择对象*</span><select required><option>KM20260925</option><option>1团</option><option>2团</option></select></label>
      <label class="field"><span>导出模板*</span><select required><option>弹药标准格式</option><option>地接接待格式</option><option>铁路报备格式</option></select></label>
      <div class="field"><span>文件格式</span><div class="export-format"><label><input type="radio" name="format" checked> Excel</label><label><input type="radio" name="format"> PDF</label></div></div>
      <div class="field full"><span>包含字段</span><div class="check-grid">
        <label><input type="checkbox" checked>姓名</label><label><input type="checkbox" checked>性别</label><label><input type="checkbox" checked>证件号</label><label><input type="checkbox" checked>手机号</label><label><input type="checkbox" checked>房型床位</label><label><input type="checkbox" checked>紧急联系人</label><label><input type="checkbox" checked>特殊需求</label><label><input type="checkbox">保险单号</label>
      </div></div>
    </div>
    <div class="modal-foot" style="padding-left:0;padding-right:0;padding-bottom:0;"><a class="button secondary" href="ops-namelist.html">取消</a><button class="button primary" type="button" data-toast="名单文件已导出下载">导出下载</button></div>
  </section>
</body>
</html>
