<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>单房差价 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="price-single-diff" data-title="单房差价">
  <header class="page-header">
    <div>
      <div class="eyebrow">SINGLE ROOM DIFF</div>
      <h1>单房差价</h1>
      <p>配置不足入住人数或独立成房时的补差规则。</p>
    </div>
    <div class="page-actions">
      <button class="button primary" type="button" data-modal-open="singleDiffModal">新增单房差</button>
    </div>
  </header>

  <section class="panel">
    <div class="form-grid cols-2">
      <label class="field wide"><span>价格方案</span><select><option>9月旺季价</option><option>10月国庆价</option></select></label>
      <label class="field"><span>房型筛选</span><select><option>全部房型</option><option>安途尊享房</option><option>悦途品质房</option></select></label>
    </div>
  </section>

  <section class="panel">
    <div class="panel-header"><div><h2>单房差价表</h2><p>下单、退改和确认件生成时共同调用此规则。</p></div><span class="badge orange">9月旺季价</span></div>
    <div class="table-wrap">
      <table class="data-table selectable" id="singleDiffTable">
        <thead><tr><th>房型</th><th>单房差金额</th><th>适用场景</th><th>备注</th><th>操作</th></tr></thead>
        <tbody>
          <tr class="selected"><td><b>安途尊享房</b></td><td>¥1200</td><td>独立成房/不足入住人数补差</td><td>尊享房2人起订，第三人不计单房差</td><td><button class="button ghost small" data-modal-open="singleDiffModal">编辑</button></td></tr>
          <tr><td><b>悦途品质房</b></td><td>¥700</td><td>独立成房/不足入住人数补差</td><td>两人专属包厢按专属价优先计算</td><td><button class="button ghost small" data-modal-open="singleDiffModal">编辑</button></td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination"><span>共 2 条 · 每页 10 条</span><div><button>‹</button><button class="active">1</button><button>›</button></div></div>
  </section>

  <div class="modal" id="singleDiffModal" hidden>
    <form class="modal-card" data-success="单房差价已保存">
      <div class="modal-head"><div><h2>单房差编辑</h2></div><button class="modal-close" type="button" data-modal-close>×</button></div>
      <div class="modal-body">
        <label class="field"><span>房型*</span><select required><option>安途尊享房</option><option>悦途品质房</option></select></label>
        <label class="field"><span>单房差金额*</span><input type="number" value="1200" required></label>
        <label class="field full"><span>适用场景说明</span><textarea>独立成房/不足入住人数补差。</textarea></label>
      </div>
      <div class="modal-foot"><button class="button secondary" type="button" data-modal-close>取消</button><button class="button primary" type="submit">保存</button></div>
    </form>
  </div>
</body>
</html>
