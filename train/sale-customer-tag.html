<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客户标签 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
  <style>
    .color-dot { width:18px; height:18px; display:inline-block; border-radius:6px; box-shadow: inset 0 0 0 1px rgba(0,0,0,.08); vertical-align:middle; }
  </style>
</head>
<body data-page="sale-customer-tag" data-title="客户标签">
  <header class="page-header">
    <div>
      <div class="eyebrow">CUSTOMER TAGS</div>
      <h1>客户标签</h1>
      <p>维护客户人群、偏好和价值标签，支撑销售跟进和客群筛选。</p>
    </div>
    <div class="page-actions">
      <button class="button primary" type="button" data-modal-open="tagModal">新增标签</button>
    </div>
  </header>

  <section class="panel">
    <div class="panel-header">
      <div><h2>标签列表</h2><p>标签颜色用于客户列表、客户详情和销售台席中的快速识别。</p></div>
      <span class="badge purple">8个标签</span>
    </div>
    <div class="table-wrap">
      <table class="data-table selectable" id="tagTable">
        <thead><tr><th>标签名称</th><th>标签颜色</th><th>标签类型</th><th>关联客户数</th><th>创建时间</th><th>操作</th></tr></thead>
        <tbody>
          <tr class="selected"><td><b>银发</b></td><td><span class="color-dot" style="background:#e88b2b;"></span></td><td><span class="badge orange">人群</span></td><td>326</td><td>2026-01-10</td><td><button class="button ghost small" data-modal-open="tagModal">编辑</button><button class="button ghost small" data-confirm="确认删除银发标签？" data-confirm-success="标签已删除">删除</button></td></tr>
          <tr><td><b>俱乐部会员</b></td><td><span class="color-dot" style="background:#7758c4;"></span></td><td><span class="badge orange">人群</span></td><td>216</td><td>2026-01-10</td><td><button class="button ghost small" data-modal-open="tagModal">编辑</button><button class="button ghost small" data-confirm="确认删除俱乐部会员标签？" data-confirm-success="标签已删除">删除</button></td></tr>
          <tr><td><b>高净值</b></td><td><span class="color-dot" style="background:#d84f58;"></span></td><td><span class="badge purple">价值</span></td><td>88</td><td>2026-01-10</td><td><button class="button ghost small" data-modal-open="tagModal">编辑</button><button class="button ghost small" data-confirm="确认删除高净值标签？" data-confirm-success="标签已删除">删除</button></td></tr>
          <tr><td><b>复购客户</b></td><td><span class="color-dot" style="background:#3478e5;"></span></td><td><span class="badge purple">价值</span></td><td>152</td><td>2026-01-10</td><td><button class="button ghost small" data-modal-open="tagModal">编辑</button><button class="button ghost small" data-confirm="确认删除复购客户标签？" data-confirm-success="标签已删除">删除</button></td></tr>
          <tr><td><b>出境意向</b></td><td><span class="color-dot" style="background:#239665;"></span></td><td><span class="badge blue">偏好</span></td><td>64</td><td>2026-01-10</td><td><button class="button ghost small" data-modal-open="tagModal">编辑</button><button class="button ghost small" data-confirm="确认删除出境意向标签？" data-confirm-success="标签已删除">删除</button></td></tr>
          <tr><td><b>团体</b></td><td><span class="color-dot" style="background:#173955;"></span></td><td><span class="badge orange">人群</span></td><td>109</td><td>2026-01-10</td><td><button class="button ghost small" data-modal-open="tagModal">编辑</button><button class="button ghost small" data-confirm="确认删除团体标签？" data-confirm-success="标签已删除">删除</button></td></tr>
          <tr><td><b>敏感忌口</b></td><td><span class="color-dot" style="background:#faad14;"></span></td><td><span class="badge blue">偏好</span></td><td>73</td><td>2026-01-10</td><td><button class="button ghost small" data-modal-open="tagModal">编辑</button><button class="button ghost small" data-confirm="确认删除敏感忌口标签？" data-confirm-success="标签已删除">删除</button></td></tr>
          <tr><td><b>需照护</b></td><td><span class="color-dot" style="background:#ff4d4f;"></span></td><td><span class="badge blue">偏好</span></td><td>45</td><td>2026-01-10</td><td><button class="button ghost small" data-modal-open="tagModal">编辑</button><button class="button ghost small" data-confirm="确认删除需照护标签？" data-confirm-success="标签已删除">删除</button></td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination"><span>共 8 条 · 每页 10 条</span><div><button>‹</button><button class="active">1</button><button>›</button></div></div>
  </section>

  <div class="modal" id="tagModal" hidden>
    <form class="modal-card" data-success="客户标签已保存">
      <div class="modal-head"><div><h2>标签编辑</h2></div><button class="modal-close" type="button" data-modal-close>×</button></div>
      <div class="modal-body">
        <label class="field"><span>标签名称*</span><input value="银发" required></label>
        <label class="field"><span>标签颜色</span><input type="color" value="#e88b2b"></label>
        <label class="field"><span>标签类型</span><select><option>人群</option><option>偏好</option><option>价值</option></select></label>
        <label class="field full"><span>说明</span><textarea>用于标记长者客户，销售跟进时需重点关注适老化服务、餐食偏好和照护需求。</textarea></label>
      </div>
      <div class="modal-foot"><button class="button secondary" type="button" data-modal-close>取消</button><button class="button primary" type="submit">保存</button></div>
    </form>
  </div>
</body>
</html>
