<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>展示规则 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
  <style>
    .preview-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; padding: 16px; }
    .preview-card { min-height: 112px; padding: 14px; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
    .preview-card b, .preview-card span, .preview-card small { display: block; }
    .preview-card b { color: #20364b; font-size: 14px; }
    .preview-card span { margin: 8px 0 6px; }
    .preview-card small { color: #87939f; font-size: 10px; }
  </style>
</head>
<body data-page="stock-display-rule" data-title="展示规则">
  <header class="page-header">
    <div>
      <div class="eyebrow">DISPLAY RULE</div>
      <h1>展示规则</h1>
      <p>配置对客库存文案口径，只展示模糊状态，隐藏内部真实库存数字。</p>
    </div>
    <div class="page-actions">
      <button class="button secondary" type="button" data-toast="展示规则已预览">预览</button>
      <button class="button primary" type="button" data-toast="展示规则已保存">保存</button>
    </div>
  </header>

  <section class="panel">
    <div class="panel-header"><div><h2>对客展示规则</h2><p>用于 C 端、公众号、小程序和分销门户的库存标签展示。</p></div><span class="badge orange">隐藏真实数字</span></div>
    <form class="form-section" data-success="展示规则已保存">
      <div class="form-grid cols-3">
        <label class="field"><span>余量≥N显示“充足”，N=</span><input type="number" value="20"></label>
        <label class="field"><span>余量在X~Y显示“紧张”，X=</span><input type="number" value="5"></label>
        <label class="field"><span>余量在X~Y显示“紧张”，Y=</span><input type="number" value="19"></label>
        <label class="field"><span>余量≤M显示“仅剩X间”，M=</span><input type="number" value="4"></label>
        <label class="field"><span>余量为0显示</span><input value="售罄" readonly></label>
        <label class="check-row"><input type="checkbox" checked><div><b>隐藏真实数字</b><span>对客不展示内部真实库存</span></div><span class="badge green">开</span></label>
      </div>
      <div class="modal-foot"><button class="button secondary" type="button" data-toast="已恢复默认规则">恢复默认</button><button class="button primary" type="submit">保存</button></div>
    </form>
  </section>

  <section class="panel">
    <div class="panel-header"><div><h2>效果预览</h2><p>分别展示充足、紧张、仅剩3间和售罄四种对客标签。</p></div></div>
    <div class="preview-grid">
      <article class="preview-card"><b>安途尊享房</b><span class="badge green">充足</span><small>余量 ≥ 20 时展示</small></article>
      <article class="preview-card"><b>悦途品质房</b><span class="badge orange">紧张</span><small>余量 5-19 时展示</small></article>
      <article class="preview-card"><b>安途尊享房</b><span class="badge red">仅剩3间</span><small>余量 ≤ 4 时展示</small></article>
      <article class="preview-card"><b>悦途品质房</b><span class="badge">售罄</span><small>余量为 0 时展示</small></article>
    </div>
  </section>
</body>
</html>
