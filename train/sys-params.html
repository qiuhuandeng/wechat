<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>参数设置 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="sys-params" data-title="参数设置">
  <header class="page-header">
    <div>
      <div class="eyebrow">SYSTEM PARAMETERS</div>
      <h1>参数设置</h1>
      <p>维护基础、订单、库存、财务与安全参数，统一控制系统默认规则。</p>
    </div>
    <div class="page-actions">
      <button class="button secondary" type="button" data-toast="参数配置已导出">导出配置</button>
    </div>
  </header>

  <section class="grid gap-4 xl:grid-cols-2">
    <article class="panel">
      <div class="panel-header"><div><h2>基础参数</h2><p>公司基础信息和默认时区。</p></div></div>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="field"><span>公司名称</span><input value="昆明号运营公司"></label>
        <label class="field"><span>系统Logo</span><input type="file"></label>
        <label class="field"><span>客服热线</span><input value="177****0974"></label>
        <label class="field"><span>默认时区</span><select><option>Asia/Shanghai</option><option>UTC</option></select></label>
      </div>
      <div class="mt-4 flex justify-end"><button class="button primary small" type="button" data-toast="基础参数已保存">保存</button></div>
    </article>

    <article class="panel">
      <div class="panel-header"><div><h2>订单参数</h2><p>订单编号、定金、尾款和自动取消规则。</p></div></div>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="field"><span>订单号前缀</span><input value="DD"></label>
        <label class="field"><span>默认定金比例(%)</span><input type="number" value="20"></label>
        <label class="field"><span>尾款截止天数(发车前N天)</span><input type="number" value="30"></label>
        <label class="field"><span>订单自动取消时限(未付款N小时)</span><input type="number" value="24"></label>
      </div>
      <div class="mt-4 flex justify-end"><button class="button primary small" type="button" data-toast="订单参数已保存">保存</button></div>
    </article>

    <article class="panel">
      <div class="panel-header"><div><h2>库存参数</h2><p>守仓有效期、自动释放、超售规则。</p></div></div>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="field"><span>默认守仓有效期(天)</span><input type="number" value="7"></label>
        <div class="field"><span>守仓到期自动释放</span><label class="flex items-center gap-2 rounded-xl border border-slate-200 bg-slate-50 p-3 text-sm"><input type="checkbox" checked> 开启</label></div>
        <div class="field"><span>是否允许超售</span><label class="flex items-center gap-2 rounded-xl border border-slate-200 bg-slate-50 p-3 text-sm"><input type="checkbox"> 关闭</label></div>
        <label class="field"><span>超售比例(%)</span><input type="number" value="0"></label>
      </div>
      <div class="mt-4 flex justify-end"><button class="button primary small" type="button" data-toast="库存参数已保存">保存</button></div>
    </article>

    <article class="panel">
      <div class="panel-header"><div><h2>财务参数</h2><p>默认税率、对账周期和账期提醒。</p></div></div>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="field"><span>默认税率(%)</span><input type="number" value="6"></label>
        <label class="field"><span>对账周期</span><select><option>月结</option><option>半月结</option><option>周结</option><option>单结</option></select></label>
        <label class="field"><span>账期提醒提前天数</span><input type="number" value="7"></label>
      </div>
      <div class="mt-4 flex justify-end"><button class="button primary small" type="button" data-toast="财务参数已保存">保存</button></div>
    </article>

    <article class="panel xl:col-span-2">
      <div class="panel-header"><div><h2>安全参数</h2><p>密码强度、失败锁定和会话超时。</p></div></div>
      <div class="grid gap-4 md:grid-cols-3">
        <label class="field"><span>密码强度要求</span><select><option>强：大小写+数字+符号</option><option>中：字母+数字</option><option>弱：6位以上</option></select></label>
        <label class="field"><span>登录失败锁定次数</span><input type="number" value="5"></label>
        <label class="field"><span>会话超时时长(分钟)</span><input type="number" value="30"></label>
      </div>
      <div class="mt-4 flex justify-end"><button class="button primary small" type="button" data-toast="安全参数已保存">保存</button></div>
    </article>
  </section>
</body>
</html>
