<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据字典 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="sys-dict" data-title="数据字典">
  <header class="page-header">
    <div>
      <div class="eyebrow">DATA DICTIONARY</div>
      <h1>数据字典</h1>
      <p>统一维护房型、车厢、铺位、渠道、客户标签、款项、退改原因和证件类型等基础枚举。</p>
    </div>
    <div class="page-actions">
      <button class="button secondary" type="button" data-toast="字典已导出">导出</button>
      <button class="button primary" type="button" data-modal-open="dictModal">新增字典项</button>
    </div>
  </header>

  <section class="grid gap-4 lg:grid-cols-[300px_1fr]">
    <aside class="panel">
      <div class="panel-header"><div><h2>字典分类</h2><p>选择左侧分类维护右侧字典项。</p></div><span class="badge blue">8类</span></div>
      <div class="space-y-1">
        <button class="tree-item active" type="button">房型档次</button>
        <button class="tree-item" type="button" data-toast="已切换到车厢类型">车厢类型</button>
        <button class="tree-item" type="button" data-toast="已切换到铺位类型">铺位类型</button>
        <button class="tree-item" type="button" data-toast="已切换到渠道类型">渠道类型</button>
        <button class="tree-item" type="button" data-toast="已切换到客户标签">客户标签</button>
        <button class="tree-item" type="button" data-toast="已切换到款项类型">款项类型</button>
        <button class="tree-item" type="button" data-toast="已切换到退改原因">退改原因</button>
        <button class="tree-item" type="button" data-toast="已切换到证件类型">证件类型</button>
      </div>
    </aside>

    <section class="panel">
      <div class="panel-header">
        <div><h2>房型档次 · 字典项</h2><p>示例：5钻 / 4钻，用于产品、车型和价格页展示。</p></div>
        <button class="button primary small" type="button" data-modal-open="dictModal">新增字典项</button>
      </div>
      <div class="table-wrap">
        <table class="data-table selectable" id="dictTable">
          <thead><tr><th>字典键</th><th>字典值</th><th>显示颜色</th><th>排序</th><th>状态</th><th>操作</th></tr></thead>
          <tbody>
            <tr class="selected"><td>ROOM_LEVEL_5</td><td><b>5钻</b></td><td><span class="inline-block h-4 w-10 rounded bg-[#3478e5]"></span></td><td>1</td><td><span class="badge green">启用</span></td><td><button class="button ghost small" data-modal-open="dictModal">编辑</button><button class="button ghost small" data-confirm="确认删除5钻？" data-confirm-success="字典项已删除">删除</button></td></tr>
            <tr><td>ROOM_LEVEL_4</td><td><b>4钻</b></td><td><span class="inline-block h-4 w-10 rounded bg-[#e88b2b]"></span></td><td>2</td><td><span class="badge green">启用</span></td><td><button class="button ghost small" data-modal-open="dictModal">编辑</button><button class="button ghost small" data-confirm="确认删除4钻？" data-confirm-success="字典项已删除">删除</button></td></tr>
            <tr><td>ROOM_LEVEL_3</td><td><b>3钻</b></td><td><span class="inline-block h-4 w-10 rounded bg-[#239665]"></span></td><td>3</td><td><span class="badge">停用</span></td><td><button class="button ghost small" data-modal-open="dictModal">编辑</button><button class="button ghost small" data-confirm="确认删除3钻？" data-confirm-success="字典项已删除">删除</button></td></tr>
            <tr><td>ROOM_LEVEL_LUX</td><td><b>尊享</b></td><td><span class="inline-block h-4 w-10 rounded bg-[#7758c4]"></span></td><td>4</td><td><span class="badge green">启用</span></td><td><button class="button ghost small" data-modal-open="dictModal">编辑</button><button class="button ghost small" data-confirm="确认删除尊享？" data-confirm-success="字典项已删除">删除</button></td></tr>
            <tr><td>ROOM_LEVEL_STD</td><td><b>品质</b></td><td><span class="inline-block h-4 w-10 rounded bg-[#0d2339]"></span></td><td>5</td><td><span class="badge green">启用</span></td><td><button class="button ghost small" data-modal-open="dictModal">编辑</button><button class="button ghost small" data-confirm="确认删除品质？" data-confirm-success="字典项已删除">删除</button></td></tr>
            <tr><td>ROOM_LEVEL_TMP</td><td><b>临时</b></td><td><span class="inline-block h-4 w-10 rounded bg-[#d84f58]"></span></td><td>99</td><td><span class="badge">停用</span></td><td><button class="button ghost small" data-modal-open="dictModal">编辑</button><button class="button ghost small" data-confirm="确认删除临时？" data-confirm-success="字典项已删除">删除</button></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination"><span>共 6 条 · 每页 10 条</span><div><button>‹</button><button class="active">1</button><button>›</button></div></div>
    </section>
  </section>

  <div class="modal" id="dictModal" hidden>
    <form class="modal-card" data-success="字典项已保存">
      <div class="modal-head">
        <div><span class="eyebrow">DICT ITEM</span><h2>字典项编辑</h2></div>
        <button class="modal-close" type="button" data-modal-close>×</button>
      </div>
      <div class="modal-body">
        <label class="field"><span>字典键*</span><input value="ROOM_LEVEL_5" required></label>
        <label class="field"><span>字典值*</span><input value="5钻" required></label>
        <label class="field"><span>显示颜色</span><input type="color" value="#3478e5"></label>
        <label class="field"><span>排序</span><input type="number" value="1"></label>
        <div class="field"><span>状态</span><label class="flex items-center gap-2 rounded-xl border border-slate-200 bg-slate-50 p-3 text-sm"><input type="checkbox" checked> 启用</label></div>
      </div>
      <div class="modal-foot">
        <button class="button secondary" type="button" data-modal-close>取消</button>
        <button class="button primary" type="submit">保存</button>
      </div>
    </form>
  </div>
</body>
</html>
