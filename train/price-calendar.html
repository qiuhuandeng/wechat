<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>价格日历 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
  <style>
    .price-legend { display:flex; gap:8px; align-items:center; color:#7b8997; font-size:12px; }
    .price-legend i { width:10px; height:10px; border-radius:3px; display:inline-block; margin-right:4px; }
    .price-low { border-left-color:#239665; color:#136544; background:#e5f6ee; }
    .price-mid { border-left-color:#3478e5; color:#235aa5; background:#eaf2ff; }
    .price-high { border-left-color:#e88b2b; color:#7f4c17; background:#fff2e2; }
    .calendar-day.today { box-shadow: inset 0 0 0 2px rgba(52,120,229,.24); }
  </style>
</head>
<body data-page="price-calendar" data-title="价格日历">
  <header class="page-header">
    <div>
      <div class="eyebrow">PRICE CALENDAR</div>
      <h1>价格日历</h1>
      <p>按月查看班期价格，支持单日快速改价与批量改价。</p>
    </div>
    <div class="page-actions">
      <button class="button secondary" type="button" data-modal-open="batchPriceModal">批量改价</button>
    </div>
  </header>

  <section class="panel">
    <div class="form-grid cols-3">
      <label class="field"><span>产品</span><select><option>环云南9天</option><option>滇西秘境7天</option></select></label>
      <label class="field"><span>房型</span><select><option>安途尊享房</option><option>悦途品质房</option></select></label>
      <div class="field"><span>价格档位</span><div class="price-legend"><span><i style="background:#e5f6ee"></i>低价</span><span><i style="background:#eaf2ff"></i>中价</span><span><i style="background:#fff2e2"></i>高价</span></div></div>
    </div>
  </section>

  <section class="panel">
    <div class="calendar">
      <div class="calendar-head">
        <button type="button" data-toast="已切换到上月">‹</button>
        <b>2026年9月</b>
        <button type="button" data-toast="已切换到下月">›</button>
      </div>
      <div class="calendar-week"><span>周一</span><span>周二</span><span>周三</span><span>周四</span><span>周五</span><span>周六</span><span>周日</span></div>
      <div class="calendar-grid">
        <div class="calendar-day outside"><span>31</span></div>
        <div class="calendar-day"><span>1</span></div>
        <div class="calendar-day"><span>2</span></div>
        <div class="calendar-day"><span>3</span></div>
        <div class="calendar-day"><span>4</span></div>
        <div class="calendar-day"><span>5</span></div>
        <div class="calendar-day"><span>6</span></div>
        <div class="calendar-day"><span>7</span></div>
        <div class="calendar-day"><span>8</span></div>
        <div class="calendar-day"><span>9</span></div>
        <div class="calendar-day"><span>10</span></div>
        <div class="calendar-day"><span>11</span></div>
        <div class="calendar-day"><span>12</span></div>
        <div class="calendar-day"><span>13</span></div>
        <div class="calendar-day"><span>14</span></div>
        <div class="calendar-day"><span>15</span></div>
        <div class="calendar-day"><span>16</span></div>
        <div class="calendar-day"><span>17</span></div>
        <div class="calendar-day"><span>18</span><button class="calendar-event price-low" type="button" data-modal-open="dayPriceModal"><b>预售价</b><small>¥11999</small></button></div>
        <div class="calendar-day"><span>19</span></div>
        <div class="calendar-day"><span>20</span></div>
        <div class="calendar-day"><span>21</span></div>
        <div class="calendar-day"><span>22</span></div>
        <div class="calendar-day"><span>23</span></div>
        <div class="calendar-day"><span>24</span></div>
        <div class="calendar-day today"><span>25</span><button class="calendar-event price-high" type="button" data-modal-open="dayPriceModal"><b>KM20260925</b><small>¥12999</small></button></div>
        <div class="calendar-day"><span>26</span></div>
        <div class="calendar-day"><span>27</span></div>
        <div class="calendar-day"><span>28</span></div>
        <div class="calendar-day"><span>29</span><button class="calendar-event price-mid" type="button" data-modal-open="dayPriceModal"><b>候补班期</b><small>¥12599</small></button></div>
        <div class="calendar-day"><span>30</span></div>
        <div class="calendar-day outside"><span>1</span></div>
        <div class="calendar-day outside"><span>2</span></div>
        <div class="calendar-day outside"><span>3</span></div>
        <div class="calendar-day outside"><span>4</span></div>
      </div>
    </div>
  </section>

  <div class="modal" id="dayPriceModal" hidden>
    <form class="modal-card" data-success="日期价格已保存">
      <div class="modal-head"><div><h2>日期价格编辑</h2></div><button class="modal-close" type="button" data-modal-close>×</button></div>
      <div class="modal-body">
        <label class="field"><span>出发日期</span><input value="2026-09-25" readonly></label>
        <label class="field"><span>房型</span><input value="安途尊享房" readonly></label>
        <label class="field"><span>当前人均价</span><input value="¥12999" readonly></label>
        <label class="check-row"><input type="checkbox" checked><div><b>是否节假日加价</b><span>开启后进入高价档</span></div><span class="badge orange">开</span></label>
        <label class="field full"><span>快速改价输入框</span><input type="number" value="12999"></label>
      </div>
      <div class="modal-foot"><button class="button secondary" type="button" data-modal-close>取消</button><button class="button primary" type="submit">保存</button></div>
    </form>
  </div>

  <div class="modal" id="batchPriceModal" hidden>
    <form class="modal-card" data-success="批量改价已确认">
      <div class="modal-head"><div><h2>批量改价</h2></div><button class="modal-close" type="button" data-modal-close>×</button></div>
      <div class="modal-body">
        <label class="field"><span>开始日期</span><input type="date" value="2026-09-01"></label>
        <label class="field"><span>结束日期</span><input type="date" value="2026-09-30"></label>
        <label class="field"><span>调整方式</span><select><option>涨跌%</option><option>固定值</option></select></label>
        <label class="field"><span>数值</span><input type="number" value="5"></label>
      </div>
      <div class="modal-foot"><button class="button secondary" type="button" data-modal-close>取消</button><button class="button primary" type="submit">确认</button></div>
    </form>
  </div>
</body>
</html>
