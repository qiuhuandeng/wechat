<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>铺位规则 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="stock-berth-config" data-title="铺位规则">
  <header class="page-header">
    <div><div class="eyebrow">BERTH RULE</div><h1>铺位规则</h1><p>铺位规则已收敛到房型包厢内维护，本页保留为二级查看入口。</p></div>
    <div class="page-actions"><a class="button secondary" href="stock-cabin-config.html">返回房型包厢</a><button class="button primary" type="button" data-modal-open="berthRuleModal">新增铺位规则</button></div>
  </header>

  <section class="panel">
    <div class="toolbar">
      <div class="form-grid cols-3">
        <label class="field"><span>房型包厢</span><select><option>安途尊享房</option><option>悦途品质房</option></select></label>
        <label class="field"><span>房型档次</span><select><option>5钻</option><option>4钻</option></select></label>
        <label class="field"><span>应用方式</span><select><option>随编组生成铺位实例</option></select></label>
      </div>
      <div class="toolbar-actions"><span class="badge orange">模板内规则</span></div>
    </div>
  </section>

  <section class="panel">
    <div class="panel-header"><div><h2>安途尊享房铺位规则</h2><p>规则只定义序号、类型和命名方式，实际铺位编号由编组配置生成。</p></div></div>
    <div class="table-wrap">
      <table class="data-table selectable" id="berthRuleTable">
        <thead><tr><th>铺位序号</th><th>默认编号规则</th><th>铺位类型</th><th>床尺寸</th><th>铺位属性</th><th>默认状态</th><th>操作</th></tr></thead>
        <tbody>
          <tr class="selected"><td>A</td><td>{车厢}-{包厢}-A</td><td><span class="badge orange">双人床</span></td><td>200×150</td><td>主床 / 优先售卖</td><td><span class="badge green">可售</span></td><td><button class="button ghost small" data-modal-open="berthRuleModal">编辑</button></td></tr>
          <tr><td>B</td><td>{车厢}-{包厢}-B</td><td><span class="badge blue">上铺</span></td><td>200×75</td><td>加铺 / 第三人</td><td><span class="badge green">可售</span></td><td><button class="button ghost small" data-modal-open="berthRuleModal">编辑</button></td></tr>
          <tr><td>C</td><td>{车厢}-{包厢}-C</td><td><span class="badge">沙发床</span></td><td>200×75</td><td>加铺 / 可停用</td><td><span class="badge green">可售</span></td><td><button class="button ghost small" data-modal-open="berthRuleModal">编辑</button></td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination"><span>共 3 条 · 每页 10 条</span><div><button>‹</button><button class="active">1</button><button>›</button></div></div>
  </section>

  <div class="modal" id="berthRuleModal" hidden>
    <form class="modal-card" data-success="铺位规则已保存">
      <div class="modal-head"><div><h2>铺位规则编辑</h2></div><button class="modal-close" type="button" data-modal-close>×</button></div>
      <div class="modal-body">
        <label class="field"><span>所属房型包厢</span><select><option>安途尊享房</option><option>悦途品质房</option></select></label>
        <label class="field"><span>铺位序号*</span><input value="A" required></label>
        <label class="field"><span>编号规则*</span><input value="{车厢}-{包厢}-A" required></label>
        <label class="field"><span>铺位类型*</span><select required><option>双人床</option><option>上铺</option><option>下铺</option><option>沙发床</option></select></label>
        <label class="field"><span>床尺寸</span><input value="200×150"></label>
        <label class="field"><span>默认状态</span><select><option>可售</option><option>停用</option><option>仅运营</option></select></label>
      </div>
      <div class="modal-foot"><button class="button secondary" type="button" data-modal-close>取消</button><button class="button primary" type="submit">保存</button></div>
    </form>
  </div>
</body>
</html>
