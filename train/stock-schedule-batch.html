<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>系统开班 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="stock-schedule-batch" data-title="系统开班">
  <header class="page-header">
    <div>
      <div class="eyebrow">BATCH SCHEDULE</div>
      <h1>系统开班</h1>
      <p>批量生成班期，确认后形成班期列表与库存初始化。</p>
    </div>
    <div class="page-actions">
      <a class="button secondary" href="stock-schedule-list.html">返回班期列表</a>
      <button class="button primary" type="button" data-toast="已生成预览班期">预览生成</button>
    </div>
  </header>

  <section class="panel">
    <div class="panel-header"><div><h2>开班参数</h2><p>每班可售总位和行程天数根据车型与线路产品自动带出。</p></div><span class="badge orange">昆明号</span></div>
    <form class="form-section" data-success="系统开班参数已保存">
      <div class="form-grid cols-3">
        <label class="field"><span>车型*</span><select required><option>昆明号</option></select></label>
        <label class="field"><span>线路产品*</span><select required><option>环云南9天</option></select></label>
        <label class="field"><span>发班频率*</span><select required><option>每周</option><option>每两周</option><option>每月</option><option>自定义</option></select></label>
        <label class="field"><span>起始出发日期*</span><input type="date" value="2026-09-25" required></label>
        <label class="field"><span>结束日期*</span><input type="date" value="2026-12-31" required></label>
        <label class="field"><span>每班可售总位</span><input type="number" value="264" readonly></label>
        <label class="field"><span>行程天数</span><input type="number" value="9" readonly></label>
        <div class="field"><span>操作</span><button class="button primary" type="button" data-toast="预览结果已刷新">预览生成</button></div>
      </div>
    </form>
  </section>

  <section class="panel">
    <div class="panel-header">
      <div><h2>预览结果</h2><p>勾选需要确认创建的班期。</p></div>
      <span class="badge blue">5 个待生成</span>
    </div>
    <div class="table-wrap">
      <table class="data-table selectable">
        <thead><tr><th>勾选</th><th>序号</th><th>出发日期</th><th>返程日期</th><th>可售位</th></tr></thead>
        <tbody>
          <tr class="selected"><td><input type="checkbox" checked></td><td>1</td><td>2026-09-25</td><td>2026-10-03</td><td>264</td></tr>
          <tr><td><input type="checkbox" checked></td><td>2</td><td>2026-10-17</td><td>2026-10-25</td><td>264</td></tr>
          <tr><td><input type="checkbox" checked></td><td>3</td><td>2026-11-14</td><td>2026-11-22</td><td>264</td></tr>
          <tr><td><input type="checkbox" checked></td><td>4</td><td>2026-12-19</td><td>2026-12-27</td><td>264</td></tr>
          <tr><td><input type="checkbox" checked></td><td>5</td><td>2026-12-28</td><td>2027-01-05</td><td>264</td></tr>
        </tbody>
      </table>
    </div>
    <div class="modal-foot">
      <button class="button secondary" type="button" data-toast="预览结果已暂存">保存草稿</button>
      <button class="button primary" type="button" data-confirm="确认生成所选 5 个班期？" data-confirm-success="已确认开班">确认开班</button>
    </div>
  </section>
</body>
</html>
