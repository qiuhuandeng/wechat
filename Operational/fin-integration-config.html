<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>接口配置 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-page="fin-integration-config" data-title="接口配置">
  <header class="page-header">
    <div>
      <div class="eyebrow">INTERFACE CONFIG</div>
      <h1>接口配置</h1>
      <p>维护金蝶、用友等财务系统的凭证同步接口参数。</p>
    </div>
    <div class="page-actions">
      <button class="button secondary" type="button" data-toast="测试连接成功">测试连接</button>
      <button class="button primary" type="button" data-toast="凭证同步配置已保存">保存配置</button>
    </div>
  </header>

  <section class="summary-strip">
    <div><span>财务系统</span><b>金蝶云星空</b></div>
    <div><span>连接状态</span><b>已连接</b></div>
    <div><span>同步频率</span><b>实时</b></div>
    <div><span>最近心跳</span><b>09:30</b></div>
  </section>

  <section class="panel">
    <div class="form-section">
      <div class="form-grid cols-2">
        <div class="field">
          <span>财务系统*</span>
          <label class="check-row"><input type="radio" name="financeSystem" checked required><div><b>金蝶云星空</b><span>当前生产对接系统</span></div></label>
          <label class="check-row"><input type="radio" name="financeSystem"><div><b>用友</b><span>预留对接系统</span></div></label>
        </div>
        <label class="field"><span>接口地址</span><input value="https://api.kingdee.com/..."></label>
        <label class="field"><span>账套编码</span><input value="RAILTOUR-2026"></label>
        <label class="field"><span>对接账号</span><input value="finance_sync"></label>
        <label class="field"><span>密钥/AppSecret</span><input type="password" value="kingdee-app-secret"></label>
        <label class="field"><span>同步频率</span><select><option>实时</option><option>每日定时</option></select></label>
        <div class="field full">
          <span>同步范围</span>
          <div class="check-grid">
            <label class="check-row"><input type="checkbox" checked><div><b>收入</b><span>订单应收与收款凭证</span></div></label>
            <label class="check-row"><input type="checkbox" checked><div><b>退款</b><span>退款审核后的财务凭证</span></div></label>
            <label class="check-row"><input type="checkbox" checked><div><b>应付</b><span>供应商与地接应付凭证</span></div></label>
            <label class="check-row"><input type="checkbox" checked><div><b>成本</b><span>班期成本与毛利核算</span></div></label>
            <label class="check-row"><input type="checkbox" checked><div><b>关账结果</b><span>结算关账后的最终凭证</span></div></label>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
