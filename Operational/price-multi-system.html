<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>多价体系 · 专列ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
  <style>
    .channel-detail { margin-top: 6px; color:#536476; font-size:12px; }
    .channel-detail summary { cursor:pointer; color:#3478e5; font-weight:800; }
    .channel-detail div { margin-top: 6px; display:flex; flex-wrap:wrap; gap:6px; }
  </style>
</head>
<body data-page="price-multi-system" data-title="多价体系">
  <header class="page-header">
    <div>
      <div class="eyebrow">MULTI PRICE SYSTEM</div>
      <h1>多价体系</h1>
      <p>区分门市零售价、直客价和渠道结算价，统一管控不同对象的价格口径。</p>
    </div>
    <div class="page-actions">
      <button class="button primary" type="button" data-modal-open="multiPriceModal">新增价格类型</button>
    </div>
  </header>

  <section class="panel">
    <div class="form-grid cols-2">
      <label class="field"><span>产品</span><select><option>环云南9天</option><option>滇西秘境7天</option></select></label>
      <label class="field"><span>房型</span><select><option>安途尊享房</option><option>悦途品质房</option></select></label>
    </div>
  </section>

  <section class="panel">
    <div class="panel-header"><div><h2>多价体系表</h2><p>渠道结算价行可展开查看不同签约渠道价格。</p></div><span class="badge green">启用</span></div>
    <div class="table-wrap">
      <table class="data-table selectable" id="multiPriceTable">
        <thead><tr><th>价格类型</th><th>适用对象</th><th>人均价</th><th>单房差</th><th>生效期</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>
          <tr class="selected"><td><span class="badge orange">门市零售价</span></td><td>散客</td><td>¥13999</td><td>¥1200</td><td>2026-09-01至12-31</td><td><span class="badge green">启用</span></td><td><button class="button ghost small" data-modal-open="multiPriceModal">编辑</button></td></tr>
          <tr><td><span class="badge blue">直客价</span></td><td>小程序直客</td><td>¥12999</td><td>¥1200</td><td>2026-09-01至12-31</td><td><span class="badge green">启用</span></td><td><button class="button ghost small" data-modal-open="multiPriceModal">编辑</button></td></tr>
          <tr><td><span class="badge purple">渠道结算价</span></td><td>签约渠道<details class="channel-detail" open><summary>展开渠道结算价</summary><div><span class="badge">康辉 ¥11999</span><span class="badge">众信 ¥11599</span><span class="badge">中青旅 ¥11799</span></div></details></td><td>¥11999</td><td>¥1200</td><td>2026-09-01至12-31</td><td><span class="badge green">启用</span></td><td><button class="button ghost small" data-modal-open="multiPriceModal">编辑</button></td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination"><span>共 3 条 · 每页 10 条</span><div><button>‹</button><button class="active">1</button><button>›</button></div></div>
  </section>

  <div class="modal" id="multiPriceModal" hidden>
    <form class="modal-card" data-success="多价体系已保存">
      <div class="modal-head"><div><h2>多价编辑</h2></div><button class="modal-close" type="button" data-modal-close>×</button></div>
      <div class="modal-body">
        <label class="field"><span>价格类型*</span><select required><option>门市零售价</option><option>直客价</option><option>渠道结算价</option></select></label>
        <label class="field"><span>适用对象/渠道</span><select><option>散客</option><option>小程序直客</option><option>康辉旅行社</option><option>众信旅游</option><option>中青旅</option></select></label>
        <label class="field"><span>人均价*</span><input type="number" value="12999" required></label>
        <label class="field"><span>单房差</span><input type="number" value="1200"></label>
        <label class="field"><span>生效开始</span><input type="date" value="2026-09-01"></label>
        <label class="field"><span>生效结束</span><input type="date" value="2026-12-31"></label>
      </div>
      <div class="modal-foot"><button class="button secondary" type="button" data-modal-close>取消</button><button class="button primary" type="submit">保存</button></div>
    </form>
  </div>
</body>
</html>
