<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专列运营 ERP</title>
  <link rel="icon" href="operational/assets/favicon.svg">
  <style>
    :root {
      --ink: #10263b;
      --ink-strong: #07192b;
      --muted: #6f7f90;
      --line: #dce5ee;
      --soft-line: rgba(220, 229, 238, .72);
      --paper: rgba(255, 255, 255, .92);
      --paper-solid: #ffffff;
      --brand: #f28d24;
      --brand-dark: #b95c08;
      --blue: #2e74df;
      --teal: #239b7d;
      --shadow: 0 28px 80px rgba(15, 34, 52, .18);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: #eef4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 255, 255, .86), transparent 34%),
        linear-gradient(135deg, #edf4f7 0%, #f8fafc 54%, #eaf2f1 100%);
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(760px, 48vw);
      z-index: -1;
      background:
        linear-gradient(90deg, rgba(241, 247, 249, .96) 0%, rgba(241, 247, 249, .68) 38%, rgba(241, 247, 249, .2) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, .18), rgba(235, 241, 245, .46)),
        url("tmp/pdfs/train-intro/page-02.png") 86% center / cover no-repeat;
      opacity: .72;
      pointer-events: none;
    }

    button,
    a {
      font: inherit;
    }

    .gateway-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 24px;
    }

    .gateway-shell {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(420px, .78fr);
      min-height: 640px;
      border: 1px solid rgba(255, 255, 255, .78);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .68);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      overflow: hidden;
    }

    .scenic-panel {
      position: relative;
      min-height: 640px;
      color: #fff;
      background: #0f2f44;
      overflow: hidden;
    }

    .scenic-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 70% center;
      transform: scale(1.02);
    }

    .scenic-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(90deg, rgba(7, 25, 43, .92), rgba(7, 25, 43, .42) 50%, rgba(7, 25, 43, .12)),
        linear-gradient(180deg, rgba(7, 25, 43, .16), rgba(7, 25, 43, .84));
    }

    .scenic-content {
      position: relative;
      z-index: 2;
      min-height: 640px;
      display: block;
      padding: 42px;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: rgba(242, 141, 36, .95);
      box-shadow: 0 18px 36px rgba(7, 25, 43, .28);
    }

    .brand-mark svg {
      width: 29px;
      height: 29px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-name {
      margin: 0;
      color: #fff;
      font-size: 15px;
      font-weight: 780;
      letter-spacing: 0;
    }

    .brand-en {
      margin: 4px 0 0;
      color: rgba(255, 255, 255, .62);
      font-size: 12px;
      font-weight: 650;
    }

    .scenic-title {
      position: absolute;
      left: 42px;
      bottom: 54px;
      max-width: 560px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 11px;
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 999px;
      color: rgba(255, 255, 255, .78);
      background: rgba(255, 255, 255, .1);
      font-size: 12px;
      font-weight: 700;
    }

    .scenic-title h1 {
      margin: 16px 0 12px;
      color: #fff;
      font-size: clamp(30px, 3.25vw, 42px);
      line-height: 1.14;
      font-weight: 720;
      letter-spacing: 0;
    }

    .scenic-title p {
      max-width: 540px;
      margin: 0;
      color: rgba(255, 255, 255, .72);
      font-size: 14px;
      line-height: 1.75;
      font-weight: 400;
    }

    .entry-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 30px;
      padding: 52px 48px;
      background: var(--paper);
    }

    .entry-header {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 0;
      border-bottom: 0;
    }

    .entry-kicker {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      height: 28px;
      padding: 0 11px;
      border-radius: 999px;
      color: var(--blue);
      background: #edf4ff;
      font-size: 12px;
      font-weight: 650;
    }

    .entry-header h2 {
      margin: 0;
      color: var(--ink-strong);
      font-size: 24px;
      line-height: 1.28;
      font-weight: 560;
      letter-spacing: 0;
    }

    .entry-header p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      font-weight: 400;
    }

    .port-list {
      display: grid;
      gap: 16px;
    }

    .port-card {
      position: relative;
      display: grid;
      grid-template-columns: 34px 1fr auto;
      align-items: center;
      gap: 14px;
      min-height: 78px;
      padding: 15px 16px;
      border: 1px solid var(--soft-line);
      border-radius: 16px;
      color: var(--ink);
      background: rgba(255, 255, 255, .72);
      text-align: left;
      text-decoration: none;
      overflow: hidden;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .port-card:last-child {
      border-bottom: 1px solid var(--soft-line);
    }

    .port-card::before {
      content: none;
    }

    .port-card-primary {
      border-color: rgba(242, 141, 36, .32);
      background: rgba(255, 252, 248, .84);
      box-shadow: 0 12px 26px rgba(16, 38, 59, .06);
    }

    .port-card-primary:hover {
      transform: translateY(-1px);
      border-color: rgba(242, 141, 36, .46);
      box-shadow: 0 16px 32px rgba(16, 38, 59, .08);
    }

    .port-card:focus-visible {
      outline: 3px solid rgba(46, 116, 223, .26);
      outline-offset: 3px;
    }

    .port-card-disabled {
      cursor: not-allowed;
      color: #8a98a8;
      background: rgba(248, 251, 253, .72);
    }

    .port-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: var(--brand);
      background: #fff4e8;
    }

    .port-card-disabled .port-icon {
      color: #7d8b9a;
      background: #eef3f7;
    }

    .port-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .port-copy {
      min-width: 0;
    }

    .port-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: inherit;
      font-size: 15px;
      line-height: 1.28;
      font-weight: 540;
    }

    .port-desc {
      max-width: 280px;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      font-weight: 400;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .port-card-disabled .port-desc {
      color: #8a98a8;
    }

    .port-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      height: 28px;
      padding: 0 11px;
      border-radius: 999px;
      color: #fff;
      background: var(--ink-strong);
      font-size: 12px;
      font-weight: 560;
      white-space: nowrap;
    }

    .port-card-disabled .port-action {
      color: #7f8d9c;
      background: #eef3f7;
      border: 0;
    }

    .portal-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding-top: 2px;
    }

    .summary-item {
      min-height: 72px;
      padding: 13px 14px;
      border: 1px solid var(--soft-line);
      border-radius: 16px;
      background: rgba(255, 255, 255, .62);
    }

    .summary-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 520;
    }

    .summary-value {
      display: block;
      margin-top: 9px;
      color: var(--ink-strong);
      font-size: 17px;
      line-height: 1.2;
      font-weight: 650;
    }

    .portal-toast-area {
      position: fixed;
      top: 22px;
      left: 50%;
      z-index: 20;
      display: grid;
      gap: 10px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .portal-toast {
      min-width: 290px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid rgba(242, 141, 36, .28);
      border-radius: 999px;
      color: #74410d;
      background: rgba(255, 250, 243, .96);
      box-shadow: 0 18px 46px rgba(16, 38, 59, .18);
      opacity: 0;
      transform: translateY(-8px);
      transition: .24s ease;
      font-size: 13px;
      font-weight: 850;
    }

    .portal-toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .portal-toast-icon {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--brand);
      box-shadow: 0 0 0 4px rgba(242, 141, 36, .15);
    }

    @media (max-width: 980px) {
      .gateway-page {
        padding: 28px 16px;
      }

      .gateway-shell {
        grid-template-columns: 1fr;
      }

      .scenic-panel,
      .scenic-content {
        min-height: 420px;
      }

      .entry-panel {
        padding: 30px;
      }
    }

    @media (max-width: 640px) {
      .gateway-page {
        padding: 18px 12px;
      }

      .gateway-shell {
        border-radius: 22px;
      }

      .scenic-panel,
      .scenic-content {
        min-height: 360px;
      }

      .scenic-content {
        padding: 26px;
      }

      .scenic-title {
        left: 26px;
        right: 26px;
        bottom: 30px;
      }

      .entry-panel {
        padding: 24px;
      }

      .entry-header h2 {
        font-size: 22px;
      }

      .port-card {
        grid-template-columns: 34px 1fr;
      }

      .port-action {
        grid-column: 2;
        width: fit-content;
      }

      .portal-summary {
        grid-template-columns: 1fr;
      }

    }
  </style>
</head>
<body>
  <main class="gateway-page">
    <div class="portal-toast-area" aria-live="polite"></div>

    <section class="gateway-shell" aria-label="专列运营 ERP 端口入口">
      <aside class="scenic-panel">
        <img class="scenic-image" src="tmp/pdfs/train-intro/page-02.png" alt="昆明号专列穿行云南山谷">
        <div class="scenic-content">
          <div class="brand-lockup">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M7 4h10a2 2 0 0 1 2 2v9a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3V6a2 2 0 0 1 2-2Z" />
                <path d="M8 8h8M8 12h8M8 21l2-3M16 18l2 3" />
              </svg>
            </span>
            <div>
              <p class="brand-name">专列运营 ERP</p>
              <p class="brand-en">Rail Tour Operation Portal</p>
            </div>
          </div>

          <div class="scenic-title">
            <span class="eyebrow">昆明号 · 彩云之南</span>
            <h1>把一趟专列，从库存到发团管起来</h1>
            <p>面向专列旅游业务的统一运营入口，承接运力库存、产品定价、销售分销、订单交易、计调作业、财务管理与数据分析。</p>
          </div>
        </div>
      </aside>

      <section class="entry-panel">
        <header class="entry-header">
          <span class="entry-kicker">端口入口</span>
          <div>
            <h2>专列运营入口</h2>
            <p>当前开放业务后台，报名端与分销端作为后续端口保留。</p>
          </div>
        </header>

        <div class="port-list">
          <a class="port-card port-card-primary" href="operational/index.html">
            <span class="port-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M3 18h18" />
                <path d="M6 18V7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v11" />
                <path d="M8 9h8M8 13h8" />
                <path d="M8 22l2-4M16 18l2 4" />
              </svg>
            </span>
            <span class="port-copy">
              <span class="port-label">业务端 Operational</span>
              <span class="port-desc">库存、价格、订单、计调、财务与数据。</span>
            </span>
            <span class="port-action">进入</span>
          </a>

          <button class="port-card port-card-disabled" type="button" data-locked-name="C 端报名端" aria-disabled="true">
            <span class="port-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 18h.01" />
                <path d="M8 21h8a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2Z" />
              </svg>
            </span>
            <span class="port-copy">
              <span class="port-label">C 端报名端</span>
              <span class="port-desc">游客报名、支付与选铺入口。</span>
            </span>
            <span class="port-action">暂未开发</span>
          </button>

          <button class="port-card port-card-disabled" type="button" data-locked-name="分销门户端" aria-disabled="true">
            <span class="port-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M4 6h16" />
                <path d="M4 10h16" />
                <path d="M4 14h16" />
                <path d="M4 18h16" />
              </svg>
            </span>
            <span class="port-copy">
              <span class="port-label">分销门户端</span>
              <span class="port-desc">渠道查价、下单、结算与对账。</span>
            </span>
            <span class="port-action">暂未开发</span>
          </button>
        </div>

        <div class="portal-summary" aria-label="端口概况">
          <div class="summary-item">
            <span class="summary-label">当前开放</span>
            <span class="summary-value">业务端</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">业务主线</span>
            <span class="summary-value">7 模块</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">后续端口</span>
            <span class="summary-value">2 个</span>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    document.querySelectorAll("[data-locked-name]").forEach(function(button) {
      button.addEventListener("click", function() {
        var name = button.getAttribute("data-locked-name");
        var container = document.querySelector(".portal-toast-area");
        var toast = document.createElement("div");
        toast.className = "portal-toast";
        toast.innerHTML = "<span class=\"portal-toast-icon\" aria-hidden=\"true\"></span><span>「" + name + "」暂未开发，当前不可进入</span>";
        container.appendChild(toast);
        window.setTimeout(function() {
          toast.classList.add("show");
        }, 20);
        window.setTimeout(function() {
          toast.classList.remove("show");
          window.setTimeout(function() {
            toast.remove();
          }, 300);
        }, 2600);
      });
    });
  </script>
</body>
</html>
