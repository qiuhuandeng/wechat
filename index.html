<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>凯撒旅游SaaS系统</title>
  <link rel="stylesheet" href="shared/style.css">
</head>
<body>
  <main class="portal-page">
    <div class="portal-toast-area" aria-live="polite"></div>
    <div class="portal-shell">
      <section class="portal-panel">
        <header class="portal-header">
          <div class="portal-title-row">
            <span class="portal-brand" aria-hidden="true">
              <span class="portal-brand-mark">
                <svg viewBox="0 0 40 40" focusable="false">
                  <path class="caesar-brand-orbit" d="M7.5 24.8c4.7-9.7 13.8-15.1 23.7-13.9 2.1.3 3.7.9 5 1.7-2.2 1.2-4.7 2.1-7.3 2.8-7.1 1.9-12.7 5.1-16.6 11.2-1.4 2.2-3.1 1.4-4.8-1.8Z" />
                  <path class="caesar-brand-sail" d="M17.4 27.6c2.4-5.5 7.2-8.9 14.1-10.7-1.1 4.2-3.7 7.6-7.4 9.8-2.2 1.4-4.4 1.7-6.7.9Z" />
                  <path class="caesar-brand-star main" d="M15.6 6.4 17.3 10l3.8.7-3 2.7.5 4-3.5-2-3.7 1.7.8-4-2.7-3 4-.4 2.1-3.3Z" />
                  <path class="caesar-brand-star small" d="m29.4 5.4 1 2.1 2.3.4-1.7 1.6.3 2.3-2-1.1-2.2 1 .5-2.3-1.6-1.7 2.3-.3 1.1-2Z" />
                </svg>
              </span>
            </span>
            <h1 class="portal-title">凯撒集团业务系统</h1>
          </div>
          <p class="portal-subtitle">Group Management Portal</p>
        </header>

        <div class="portal-entry-stack">
          <div class="portal-row portal-row-primary">
            <a class="portal-card portal-card-primary portal-card-business" href="merchant/login.html">
              <span class="portal-card-glow" aria-hidden="true"></span>
              <span class="portal-card-head">
                <span class="portal-icon portal-icon-business" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M21 13.255A23.931 23.931 0 0 1 12 15c-3.183 0-6.22-.62-9-1.745" />
                    <path d="M16 6V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
                    <path d="M12 12h.01" />
                    <path d="M5 20h14a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2Z" />
                  </svg>
                </span>
                <span class="portal-card-arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="m9 5 7 7-7 7" />
                  </svg>
                </span>
              </span>
              <span class="portal-card-body">
                <span class="portal-card-title">业务端</span>
                <span class="portal-card-desc">业务操作、订单、产品、财务与审批</span>
              </span>
            </a>

            <a class="portal-card portal-card-primary portal-card-group" href="admin/dashboard.html">
              <span class="portal-card-glow" aria-hidden="true"></span>
              <span class="portal-card-head">
                <span class="portal-icon portal-icon-group" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M19 11H5" />
                    <path d="M19 11a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2" />
                    <path d="M19 11V9a2 2 0 0 0-2-2" />
                    <path d="M5 11V9a2 2 0 0 1 2-2" />
                    <path d="M7 7V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2" />
                    <path d="M7 7h10" />
                  </svg>
                </span>
                <span class="portal-card-arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="m9 5 7 7-7 7" />
                  </svg>
                </span>
              </span>
              <span class="portal-card-body">
                <span class="portal-card-title">集团端</span>
                <span class="portal-card-desc">组织账号、权限安全、AI治理与配置</span>
              </span>
            </a>
          </div>

          <div class="portal-row portal-row-secondary">
            <button class="portal-card portal-card-disabled" type="button" data-locked-name="小程序" aria-disabled="true">
              <span class="portal-card-head">
                <span class="portal-icon portal-icon-muted" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 18h.01" />
                    <path d="M8 21h8a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2Z" />
                  </svg>
                </span>
                <span class="portal-card-status">暂未开放</span>
              </span>
              <span class="portal-card-body">
                <span class="portal-card-title">小程序</span>
                <span class="portal-card-desc">移动端产品浏览、下单与客户服务</span>
              </span>
            </button>

            <button class="portal-card portal-card-disabled" type="button" data-locked-name="供应商端" aria-disabled="true">
              <span class="portal-card-head">
                <span class="portal-icon portal-icon-muted" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M4 6h16" />
                    <path d="M4 10h16" />
                    <path d="M4 14h16" />
                    <path d="M4 18h16" />
                  </svg>
                </span>
                <span class="portal-card-status">暂未开放</span>
              </span>
              <span class="portal-card-body">
                <span class="portal-card-title">供应商端</span>
                <span class="portal-card-desc">资源报价、确认与履约协同</span>
              </span>
            </button>

            <button class="portal-card portal-card-disabled" type="button" data-locked-name="旅游运营平台" aria-disabled="true">
              <span class="portal-card-head">
                <span class="portal-icon portal-icon-muted" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                  </svg>
                </span>
                <span class="portal-card-status">暂未开放</span>
              </span>
              <span class="portal-card-body">
                <span class="portal-card-title">旅游运营平台</span>
                <span class="portal-card-desc">SaaS租户、套餐、模板与平台运维</span>
              </span>
            </button>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script>
    document.querySelectorAll("[data-locked-name]").forEach(function(button) {
      button.addEventListener("click", function() {
        const name = button.getAttribute("data-locked-name");
        const container = document.querySelector(".portal-toast-area");
        const toast = document.createElement("div");
        toast.className = "portal-toast";
        toast.innerHTML = "<span class=\"portal-toast-icon\" aria-hidden=\"true\"></span><span>「" + name + "」正在部署中，暂未开放访问</span>";
        container.appendChild(toast);
        window.setTimeout(function() {
          toast.classList.add("show");
        }, 20);
        window.setTimeout(function() {
          toast.classList.remove("show");
          window.setTimeout(function() {
            toast.remove();
          }, 300);
        }, 3000);
      });
    });
  </script>
</body>
</html>
