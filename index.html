<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企微客服</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --panel: #ffffff;
      --text: #202a3a;
      --muted: #738198;
      --line: #d8e2f1;
      --line-strong: #cfdced;
      --shadow: 0 24px 58px rgba(45, 64, 96, .11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .portal-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 18px;
    }

    .portal-panel {
      width: min(452px, 100%);
      min-height: 500px;
      padding: 38px 40px 34px;
      background: var(--panel);
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .portal-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: 0;
      text-align: center;
    }

    .portal-subtitle {
      margin: 14px 0 40px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0;
      text-align: center;
    }

    .portal-grid {
      display: grid;
      gap: 18px;
    }

    .portal-selection {
      display: none;
    }

    .portal-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 74px;
      padding: 15px 20px 14px 24px;
      color: inherit;
      text-decoration: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(216, 226, 241, .35);
      transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    .portal-card:hover {
      transform: translateY(-1px);
      border-color: #c5d3e6;
      box-shadow: inset 0 0 0 1px rgba(197, 211, 230, .55), 0 8px 20px rgba(45, 64, 96, .06);
    }

    .portal-card-title,
    .portal-card-desc {
      display: block;
    }

    .portal-card-title {
      font-size: 15px;
      line-height: 1.35;
      font-weight: 500;
    }

    .portal-card-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.45;
    }

    .portal-card-arrow {
      width: 18px;
      height: 24px;
      flex: 0 0 auto;
      position: relative;
    }

    .portal-card-arrow::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 6px;
      width: 9px;
      height: 9px;
      border-top: 2px solid #738198;
      border-right: 2px solid #738198;
      transform: rotate(45deg);
    }

    .portal-footer {
      margin-top: 38px;
      color: #738198;
      font-size: 9px;
      font-weight: 600;
      text-align: center;
      letter-spacing: .8px;
      line-height: 1.7;
      white-space: nowrap;
    }

    @media (max-width: 560px) {
      .portal-panel {
        min-height: auto;
        padding: 34px 22px 30px;
        border-radius: 18px;
      }

      .portal-title {
        font-size: 23px;
      }

      .portal-subtitle {
        margin-bottom: 32px;
        font-size: 12px;
      }

      .portal-card {
        min-height: 78px;
        padding: 16px 18px 15px 20px;
      }

      .portal-card-title {
        font-size: 15px;
      }

      .portal-card-desc {
        font-size: 12px;
      }

      .portal-footer {
        letter-spacing: .3px;
        font-size: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="portal-page">
    <section class="portal-panel">
      <h1 class="portal-title">企微客服</h1>
      <p class="portal-subtitle">QIWEI CUSTOMER SERVICE · SUPPORT PORTAL</p>

      <div class="portal-grid">
        <span class="portal-selection" aria-hidden="true"></span>
        <a class="portal-card" href="引用撤回转发.html">
          <span>
            <span class="portal-card-title">企微客服-电脑端</span>
            <span class="portal-card-desc">AI规则配置与电脑端客服工作台</span>
          </span>
          <span class="portal-card-arrow" aria-hidden="true"></span>
        </a>
        <a class="portal-card" href="智能客服移动端.html">
          <span>
            <span class="portal-card-title">企微客服-移动端</span>
            <span class="portal-card-desc">智能客服移动端会话处理与客户跟进</span>
          </span>
          <span class="portal-card-arrow" aria-hidden="true"></span>
        </a>
        <a class="portal-card" href="ai规则.html">
          <span>
            <span class="portal-card-title">运营管理后台</span>
            <span class="portal-card-desc">客服运营配置与全局数据管理</span>
          </span>
          <span class="portal-card-arrow" aria-hidden="true"></span>
        </a>
      </div>

      <footer class="portal-footer">© 2026 QIWEI CUSTOMER SERVICE. ALL RIGHTS RESERVED.</footer>
    </section>
  </main>
</body>
</html>
